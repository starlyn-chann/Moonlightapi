<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nsfw Pene Endpoint</title>
</head>
<body>
    <script>
        // ESTA ES TU LISTA DE LINKS INDEPENDIENTE
        const dbLinks = [
            { "url": "https://files.catbox.moe/ejemplo1.mp4", "type": "video/mp4" },
            { "url": "https://files.catbox.moe/ejemplo2.jpeg", "type": "image/jpeg" },
            { "url": "https://files.catbox.moe/ejemplo3.jpg", "type": "image/jpeg" },
            { "url": "https://files.catbox.moe/ejemplo4.mp4", "type": "video/mp4" }
        ];

        // Función global que procesa y devuelve el formato exacto de tu API
        function getPeneData() {
            const randomItem = dbLinks[Math.floor(Math.random() * dbLinks.length)];
            const isVideo = randomItem.url.endsWith('.mp4');
            
            return {
                "status": true,
                "Author": "StarLyn",
                "result": {
                    "status": true,
                    "data": [
                        {
                            "title": "Moonlight Staff API",
                            "image": isVideo ? "null" : randomItem.url,
                            "video": isVideo ? randomItem.url : "null",
                            "category": "NSFW",
                            "type": randomItem.type
                        }
                    ]
                }
            };
        }

        // Si el usuario entra directamente a la URL /pene/, mostramos el JSON limpio en pantalla
        if (window.location.pathname.endsWith('/pene/') || window.location.pathname.endsWith('/pene/index.html')) {
            document.body.style.fontFamily = 'monospace';
            document.body.style.backgroundColor = '#030207';
            document.body.style.color = '#cbd5e1';
            document.body.innerHTML = `<pre>${JSON.stringify(getPeneData(), null, 2)}</pre>`;
        }
    </script>
</body>
</html>
