<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pene Endpoint</title>
</head>
<body>
    <script>
        // Cabecera para indicarle al navegador que esto es un JSON de API, no una página web
        document.body.style.fontFamily = 'monospace';
        document.body.style.backgroundColor = '#000';
        document.body.style.color = '#fff';

        // Leer la base de datos pene.json que está en esta misma carpeta
        fetch('./pene.json')
            .then(res => res.json())
            .then(database => {
                // Elegir un link aleatorio de la lista
                const lista = database.links;
                const itemAleatorio = lista[Math.floor(Math.random() * lista.length)];

                // Construir la estructura exacta solicitada
                const jsonFinal = {
                    "status": true,
                    "Author": "StarLyn",
                    "result": {
                        "status": true,
                        "data": [
                            {
                                "title": "Moonlight Staff API",
                                "image": itemAleatorio.url.endsWith('.jpeg') || itemAleatorio.url.endsWith('.jpg') ? itemAleatorio.url : "null",
                                "video": itemAleatorio.url.endsWith('.mp4') ? itemAleatorio.url : "null",
                                "category": "NSFW",
                                "type": itemAleatorio.type
                            }
                        ]
                    }
                };

                // Imprimir el JSON limpio en la pantalla
                document.body.innerHTML = `<pre>${JSON.stringify(jsonFinal, null, 2)}</pre>`;
            })
            .catch(err => {
                document.body.innerText = JSON.stringify({ "status": false, "error": "No se pudo cargar pene.json" });
            });
    </script>
</body>
</html>
