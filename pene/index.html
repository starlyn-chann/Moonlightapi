<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Moonlight Engine - Pene JSON</title>
</head>
<body>
    <script>
        // 1. TU LISTA INDEPENDIENTE DE LINKS (Pon aquí todos los que quieras)
        const dbLinks = [
            { "url": "https://files.catbox.moe/ejemplo1.mp4", "type": "video/mp4" },
            { "url": "https://files.catbox.moe/ejemplo2.jpeg", "type": "image/jpeg" },
            { "url": "https://files.catbox.moe/ejemplo3.jpg", "type": "image/jpeg" },
            { "url": "https://files.catbox.moe/ejemplo4.mp4", "type": "video/mp4" }
        ];

        // 2. LÓGICA DE SELECCIÓN ALEATORIA
        const itemAleatorio = dbLinks[Math.floor(Math.random() * dbLinks.length)];
        const isVideo = itemAleatorio.url.endsWith('.mp4');

        // 3. CONSTRUCCIÓN DE LA RESPUESTA JSON EXACTA
        const jsonResponse = {
            "status": true,
            "Author": "StarLyn",
            "result": {
                "status": true,
                "data": [
                    {
                        "title": "Moonlight Staff API",
                        "image": isVideo ? "null" : itemAleatorio.url,
                        "video": isVideo ? itemAleatorio.url : "null",
                        "category": "NSFW",
                        "type": itemAleatorio.type
                    }
                ]
            }
        };

        // 4. IMPRESIÓN LIMPIA EN PANTALLA COMO TEXTO PLANO
        document.body.style.fontFamily = 'monospace';
        document.body.style.backgroundColor = '#05030f';
        document.body.style.color = '#e2e8f0';
        document.body.innerHTML = `<pre>${JSON.stringify(jsonResponse, null, 2)}</pre>`;
    </script>
</body>
</html>
