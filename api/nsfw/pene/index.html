<script>
    fetch('./pene.json')
        .then(response => {
            if (!response.ok) throw new Error();
            return response.json();
        })
        .then(linksArray => {
            const randomLink = linksArray[Math.floor(Math.random() * linksArray.length)];
            const isVideo = randomLink.endsWith('.mp4');
            const mimeType = isVideo ? 'video/mp4' : (randomLink.endsWith('.png') ? 'image/png' : 'image/jpeg');
            
            const jsonResponse = {
                "status": true,
                "Author": "StarLyn",
                "result": {
                    "status": true,
                    "data": [
                        {
                            "title": "Moonlight Staff API",
                            "image": isVideo ? "null" : randomLink,
                            "video": isVideo ? randomLink : "null",
                            "category": "NSFW",
                            "type": mimeType
                        }
                    ]
                }
            };

            // Convertimos la respuesta en texto plano puro de navegador para eliminar cualquier rastro de HTML
            const jsonString = JSON.stringify(jsonResponse, null, 2);
            
            document.open("text/plain");
            document.write(jsonString);
            document.close();
        })
        .catch(() => {
            const errorResponse = {
                "status": false,
                "error": "No se pudo estructurar el endpoint de la API"
            };
            document.open("text/plain");
            document.write(JSON.stringify(errorResponse, null, 2));
            document.close();
        });
</script>
