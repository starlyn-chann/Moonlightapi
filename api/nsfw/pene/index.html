<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #070510;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .media-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        img, video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="media-container" id="mediaViewer"></div>

    <script>
        // Aquí pones la lista exacta de todos tus archivos locales guardados en esta misma carpeta
        const localFiles = [
            "1.jpg",
            "1.mp4",
            "2.jpg",
            "3.jpg"
            // Agrega aquí todos los que vayas subiendo siguiendo el mismo formato
        ];

        // Selecciona un archivo local al azar
        const randomFile = localFiles[Math.floor(Math.random() * localFiles.length)];
        const isVideo = randomFile.endsWith('.mp4');
        const viewer = document.getElementById('mediaViewer');

        // 1. Muestra el archivo local inmediatamente en pantalla completa
        if (isVideo) {
            viewer.innerHTML = `<video src="./${randomFile}" autoplay loop muted controls></video>`;
        } else {
            viewer.innerHTML = `<img src="./${randomFile}" alt="Media Content">`;
        }

        // 2. Dispara el aviso de descarga nativo del sistema original
        fetch(`./${randomFile}`)
            .then(res => res.blob())
            .then(blob => {
                const blobUrl = URL.createObjectURL(blob);
                const downloadLink = document.createElement('a');
                
                downloadLink.href = blobUrl;
                downloadLink.download = `moonlight_${Date.now()}_${randomFile}`;
                
                document.body.appendChild(downloadLink);
                downloadLink.click(); // Despierta la alerta nativa de descarga del navegador
                document.body.removeChild(downloadLink);
                
                setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
            })
            .catch(err => console.error("Error al procesar la descarga local:", err));
    </script>
</body>
</html>
