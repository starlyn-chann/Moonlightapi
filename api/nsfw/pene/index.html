<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Download Media</title>
</head>
<body style="background-color: #070510; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <script>
        fetch('./pene.json')
            .then(res => res.json())
            .then(async linksArray => {
                // Selecciona el link aleatorio de la lista
                const randomLink = linksArray[Math.floor(Math.random() * linksArray.length)];
                const isVideo = randomLink.endsWith('.mp4');
                const extension = isVideo ? 'mp4' : (randomLink.endsWith('.png') ? 'png' : 'jpeg');

                try {
                    // Descarga el archivo en el navegador como datos binarios (Blob)
                    const response = await fetch(randomLink);
                    const blob = await response.blob();
                    
                    // Crea un link temporal apuntando al archivo descargado
                    const blobUrl = URL.createObjectURL(blob);
                    
                    // Crea un elemento invisible para forzar la descarga nativa del celular/PC
                    const downloadLink = document.createElement('a');
                    downloadLink.href = blobUrl;
                    downloadLink.download = `moonlight_${Date.now()}.${extension}`;
                    
                    // Lo mete al documento, lo clickea para que salte el aviso de descarga y lo borra
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                    
                    // Libera la memoria del link temporal
                    URL.revokeObjectURL(blobUrl);

                    // Redirecciona la pestaña para que muestre el archivo directamente en pantalla completa
                    window.location.replace(randomLink);

                } catch (err) {
                    // Si el navegador bloquea la descarga automática por seguridad, abre el archivo directamente
                    window.location.replace(randomLink);
                }
            })
            .catch(() => {
                document.body.innerHTML = "No se pudo cargar el archivo multimedia.";
            });
    </script>
</body>
</html>
