<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirius API</title>
</head>
<body>
    <pre id="api-raw-output" style="word-wrap: break-word; white-space: pre-wrap; font-family: monospace; padding: 15px; background: #000; color: #fff; height: 100vh; margin: 0;"></pre>

    <script>
        // CONFIGURACIÓN DEL ENLACE CON TU BOT:
        // Cuando cambies de Termux a otro servidor, solo cambia 'localhost' por la IP pública de tu red.
        const DIRECCION_BOT = 'localhost'; 
        const URL_SOLICITUD = `http://${DIRECCION_BOT}:5000/api/json-links`; 

        async function procesarSolicitudApi() {
            try {
                // 1. Vercel recibe la visita y le pide al instante el JSON a la raíz de tu bot
                const respuestaBot = await fetch(URL_SOLICITUD);
                const datosJson = await respuestaBot.json();

                if (datosJson.status && datosJson.result.length > 0) {
                    // 2. Extrae el array de links y escoge uno de Catbox de forma aleatoria
                    const listaEnlaces = datosJson.result;
                    const enlaceAleatorio = listaEnlaces[Math.floor(Math.random() * listaEnlaces.length)];

                    // 3. Estructura la salida exacta, limpia y directa que tu bot de WhatsApp espera leer
                    const respuestaEstructurada = {
                        status: true,
                        result: enlaceAleatorio
                    };

                    // Imprime el JSON puro en la pantalla
                    document.getElementById('api-raw-output').textContent = JSON.stringify(respuestaEstructurada, null, 2);
                } else {
                    document.getElementById('api-raw-output').textContent = JSON.stringify({ 
                        status: false, 
                        error: "El archivo pene.json está vacío en la raíz del bot" 
                    }, null, 2);
                }
            } catch (error) {
                // Si el bot está apagado o el puerto 5000 cerrado, muestra el error estructurado
                document.getElementById('api-raw-output').textContent = JSON.stringify({ 
                    status: false, 
                    error: "No se pudo recibir respuesta del bot 24/7. Verifica que index.js esté corriendo.",
                    detalles: error.message
                }, null, 2);
            }
        }

        // =========================================================
        // ESCUDO ANTI-SUSPENSIÓN DE VERCEL (Mantiene la API despierta)
        // =========================================================
        function blindajeVeinticuatroSiete() {
            // Envía un ping automático a sí mismo cada 4 minutos para que Vercel nunca congele la ruta
            setInterval(async () => {
                try {
                    await fetch(window.location.href);
                } catch (e) {}
            }, 4 * 60 * 1000);
        }

        // Ejecutar los procesos en cuanto carga el archivo en Vercel
        procesarSolicitudApi();
        blindajeVeinticuatroSiete();
    </script>
</body>
</html>
