<script>
    fetch('./pene.json')
        .then(res => res.json())
        .then(linksArray => {
            const randomLink = linksArray[Math.floor(Math.random() * linksArray.length)];
            const isVideo = randomLink.endsWith('.mp4');
            const mimeType = isVideo ? 'video/mp4' : (randomLink.endsWith('.png') ? 'image/png' : 'image/jpeg');
            
            const jsonResponse = {
                "status": true,
                "Author": "StarLyn",
                "result": {
                    "status": true,
                    "data": [
                        {
                            "title": "Moonlight Staff API",
                            "image": isVideo ? "null" : randomLink,
                            "video": isVideo ? randomLink : "null",
                            "category": "NSFW",
                            "type": mimeType
                        }
                    ]
                }
            };

            // Borra cualquier rastro de HTML y muestra el JSON puro nativo
            document.body.innerHTML = JSON.stringify(jsonResponse, null, 2);
        })
        .catch(() => {
            document.body.innerHTML = JSON.stringify({ "status": false, "error": "No se pudo procesar" }, null, 2);
        });
</script>
