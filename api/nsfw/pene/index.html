<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sirius API - Swagger Mock</title>
</head>
<body>
    <script>
        async function cargarApiLocal() {
            try {
                // Al poner './pene.json' le decimos que busque el archivo en su misma carpeta
                const respuesta = await fetch('./pene.json');
                const linksArray = await respuesta.json();

                if (linksArray && linksArray.length > 0) {
                    // Elegimos un enlace de Catbox al azar
                    const linkAleatorio = linksArray[Math.floor(Math.random() * linksArray.length)];

                    // Armamos la estructura exacta que me mostraste
                    const respuestaApi = {
                        status: true,
                        Author: "StarLyn",
                        result: {
                            status: true,
                            data: [
                                {
                                    title: "Moonlight Staff API",
                                    image: linkAleatorio,
                                    video: "null",
                                    category: "NSFW",
                                    type: "image/jpeg"
                                }
                            ]
                        }
                    };

                    // Destruimos el HTML para mostrar el JSON crudo en blanco y negro
                    document.open("application/json");
                    document.write(JSON.stringify(respuestaApi, null, 2));
                    document.close();
                } else {
                    mostrarError("El archivo pene.json al lado del index está vacío");
                }
            } catch (error) {
                mostrarError("No se pudo leer el archivo pene.json en esta carpeta");
            }
        }

        function mostrarError(mensaje) {
            const errorJson = {
                status: false,
                error: mensaje
            };
            document.open("application/json");
            document.write(JSON.stringify(errorJson, null, 2));
            document.close();
        }

        // Se ejecuta en automático
        cargarApiLocal();
    </script>
</body>
</html>
