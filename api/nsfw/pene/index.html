<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #070510;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .media-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        img, video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="media-container" id="mediaViewer"></div>

    <script>
        // CONFIGURACIÓN: Coloca aquí la cantidad real de archivos que tienes en tu carpeta
        const TOTAL_FOTOS = 34;   // Cambia por tu número de fotos (foto1.jpg, foto2.jpg...)
        const TOTAL_VIDEOS = 30;   // Cambia por tu número de videos (video1.mp4, video2.mp4...)

        const viewer = document.getElementById('mediaViewer');

        function iniciarCarga() {
            // Elige al azar si va a mostrar una "foto" o un "video"
            const tipos = ['foto', 'video'];
            const tipoAleatorio = tipos[Math.floor(Math.random() * tipos.length)];
            
            let nombreArchivo = "";
            let isVideo = false;

            if (tipoAleatorio === 'video' && TOTAL_VIDEOS > 0) {
                const numero = Math.floor(Math.random() * TOTAL_VIDEOS) + 1;
                nombreArchivo = `video${numero}.mp4`;
                isVideo = true;
            } else if (TOTAL_FOTOS > 0) {
                // Si elige foto (o si no tienes videos configurados)
                const numero = Math.floor(Math.random() * TOTAL_FOTOS) + 1;
                nombreArchivo = `foto${numero}.jpg`;
                isVideo = false;
            } else {
                console.error("No hay archivos configurados.");
                return;
            }

            // 1. Muestra el archivo local en pantalla completa
            if (isVideo) {
                viewer.innerHTML = `<video src="./${nombreArchivo}" autoplay loop muted controls></video>`;
            } else {
                viewer.innerHTML = `<img src="./${nombreArchivo}" alt="Media Content">`;
            }

            // 2. Ejecuta la alerta de descarga por defecto del sistema
            dispararDescargaNativa(nombreArchivo);
        }

        function dispararDescargaNativa(archivo) {
            fetch(`./${archivo}`)
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.blob();
                })
                .then(blob => {
                    const blobUrl = URL.createObjectURL(blob);
                    const downloadLink = document.createElement('a');
                    
                    downloadLink.href = blobUrl;
                    downloadLink.download = `moonlight_${Date.now()}_${archivo}`;
                    
                    document.body.appendChild(downloadLink);
                    downloadLink.click(); // Despierta el aviso de descarga nativo original
                    document.body.removeChild(downloadLink);
                    
                    setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
                })
                .catch(err => console.error("Error al descargar el archivo:", archivo));
        }

        // Ejecuta el script de inmediato
        iniciarCarga();
    </script>
</body>
</html>
