<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nsfw Pene Endpoint</title>
</head>
<body style="background-color: #070510; color: #94a3b8; font-family: monospace; padding: 20px; margin: 0;">
    <pre style="margin: 0; white-space: pre-wrap; word-wrap: break-word;" id="jsonRender"></pre>

    <script>
        fetch('./pene.json')
            .then(response => {
                if (!response.ok) throw new Error();
                return response.json();
            })
            .then(linksArray => {
                const randomLink = linksArray[Math.floor(Math.random() * linksArray.length)];
                const isVideo = randomLink.endsWith('.mp4');
                const mimeType = isVideo ? 'video/mp4' : (randomLink.endsWith('.png') ? 'image/png' : 'image/jpeg');
                
                const jsonResponse = {
                    "status": true,
                    "Author": "StarLyn",
                    "result": {
                        "status": true,
                        "data": [
                            {
                                "title": "Moonlight Staff API",
                                "image": isVideo ? "null" : randomLink,
                                "video": isVideo ? randomLink : "null",
                                "category": "NSFW",
                                "type": mimeType
                            }
                        ]
                    }
                };

                document.getElementById('jsonRender').innerText = JSON.stringify(jsonResponse, null, 2);
            })
            .catch(() => {
                document.getElementById('jsonRender').innerText = JSON.stringify({
                    "status": false,
                    "error": "No se pudo estructurar el endpoint de la API"
                }, null, 2);
            });
    </script>
</body>
</html>
