<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nsfw Pene Endpoint</title>
</head>
<body>
    <script>
        fetch('./pene.json')
            .then(response => {
                if (!response.ok) throw new Error();
                return response.json();
            })
            .then(linksArray => {
                const randomLink = linksArray[Math.floor(Math.random() * linksArray.length)];
                const isVideo = randomLink.endsWith('.mp4');
                const mimeType = isVideo ? 'video/mp4' : (randomLink.endsWith('.png') ? 'image/png' : 'image/jpeg');
                
                const jsonResponse = {
                    "status": true,
                    "Author": "StarLyn",
                    "result": {
                        "status": true,
                        "data": [
                            {
                                "title": "Moonlight Staff API",
                                "image": isVideo ? "null" : randomLink,
                                "video": isVideo ? randomLink : "null",
                                "category": "NSFW",
                                "type": mimeType
                            }
                        ]
                    }
                };

                // Esto borra todo el HTML visual y deja el JSON puro como texto nativo del navegador
                document.open();
                document.write('<pre style="word-wrap: break-word; white-space: pre-wrap;">' + JSON.stringify(jsonResponse, null, 2) + '</pre>');
                document.close();
            })
            .catch(() => {
                const errorResponse = {
                    "status": false,
                    "error": "No se pudo estructurar el endpoint de la API"
                };
                document.open();
                document.write('<pre>' + JSON.stringify(errorResponse, null, 2) + '</pre>');
                document.close();
            });
    </script>
</body>
</html>
