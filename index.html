<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Docs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Variables de color de Moonlight (Neon Blue & Purple) */
        :root {
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --bg-dark: #07060f;
            --card-bg: rgba(14, 11, 28, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #07060f 0%, #0a0815 50%, #06050d 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scrollbar personalizado estilo Moonlight */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--neon-purple);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-blue);
        }

        /* Estilos Neon Estilo Moonlight Docs */
        .neon-border {
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 10px rgba(189, 0, 255, 0.3), inset 0 0 10px rgba(189, 0, 255, 0.2);
            transition: all 0.3s ease;
        }
        .neon-border:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5), inset 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .neon-text-blue {
            color: var(--neon-blue);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }
        .neon-text-purple {
            color: var(--neon-purple);
            text-shadow: 0 0 8px rgba(189, 0, 255, 0.6);
        }

        /* Fuentes especiales para títulos y terminales */
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Lienzo para partículas de fondo */
        #particles-canvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 1;
        }

        /* Highlight de JSON */
        .json-key { color: #d2a8ff; font-weight: bold; }
        .json-string { color: #a5d6ff; }
        .json-number { color: #ff7b72; }
        .json-boolean { color: #79c0ff; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <canvas id="particles-canvas"></canvas>

    <nav class="border-b-2 border-[#bd00ff] bg(12,10,22,0.9) sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#bd00ff] text-white flex items-center justify-center font-bold text-xl rounded-lg shadow-[0_0_10px_rgba(189,0,255,0.8)] border border-black">
                    <i class="fa-solid fa-moon"></i>
                </div>
                <h1 class="font-orbitron font-bold text-lg tracking-wider italic neon-text-blue">MOONLIGHT DOCS</h1>
            </div>
            
            <div class="flex-1 max-w-md mx-auto overflow-hidden h-8 bg-black/60 border border-[#bd00ff]/40 flex items-center hidden md:flex rounded px-4">
                <div class="text-white text-xs font-mono tracking-widest whitespace-nowrap animate-pulse">
                    SYSTEM STATUS: ALL SYSTEMS OPERATIONAL // READY
                </div>
            </div>

            <div class="flex items-center gap-3">
                <a href="#" class="w-10 h-10 border border-[#bd00ff] bg-black/40 rounded flex items-center justify-center hover:bg-[#bd00ff]/20 transition-all">
                    <i class="fa-brands fa-whatsapp text-xl text-[#00f0ff]"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8 grid lg:grid-cols-12 gap-8 items-start relative z-10">
        
        <aside class="lg:col-span-4 lg:sticky lg:top-24 flex flex-col gap-6 w-full">
            
            <div class="bg-black/80 border-2 border-[#bd00ff] shadow-[0_0_15px_rgba(189,0,255,0.2)] flex flex-col h-[280px] rounded-lg overflow-hidden">
                <div class="bg-black/40 p-2 flex items-center justify-between border-b border-[#bd00ff]/30">
                    <div class="flex gap-2 pl-1">
                        <div class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-yellow-500"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-green-500"></div>
                    </div>
                    <span class="text-[10px] text-[#00f0ff] font-bold font-orbitron tracking-wider">MOONLIGHT CORE v2.0</span>
                </div>
                <div id="term-logs" class="p-3 font-mono text-[11px] text-gray-300 overflow-y-auto flex-1 space-y-1">
                    <div><span class="text-green-400">root@moonlight:~$</span> initialized docs shell...</div>
                </div>
            </div>
            
            <div class="relative">
                <input type="text" id="search-input" placeholder="BUSCAR ENDPOINT..." class="w-full h-12 bg-black/60 border-2 border-[#bd00ff] px-4 pl-10 font-bold font-orbitron text-xs tracking-wider text-white focus:outline-none focus:border-[#00f0ff] transition-all rounded shadow-lg placeholder:text-gray-600">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-4 text-[#bd00ff]"></i>
            </div>

            <div class="bg(14,11,28,0.7) border-2 border-[#bd00ff] p-4 rounded-lg backdrop-blur-md">
                <h3 class="font-orbitron font-bold text-sm tracking-wide neon-text-purple mb-3 uppercase">SERVER PANEL</h3>
                <div class="space-y-2 font-mono text-xs">
                    <div class="flex justify-between border-b border-[#bd00ff]/10 pb-1">
                        <span class="text-gray-500">HORA LOCAL</span>
                        <span id="server-time" class="text-white font-bold">00:00:00</span>
                    </div>
                    <div class="flex justify-between border-b border-[#bd00ff]/10 pb-1">
                        <span class="text-gray-500">FECHA</span>
                        <span id="server-date" class="text-white">--/--/----</span>
                    </div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8 w-full min-h-[50vh]">
            <div id="api-container" class="space-y-4">
                </div>
            
            <div id="no-results" class="hidden flex-col items-center justify-center py-20 text-center opacity-60">
                <i class="fa-solid fa-box-open text-4xl mb-3 text-[#bd00ff]"></i>
                <p class="font-orbitron font-bold text-lg text-[#00f0ff]">NO ENDPOINTS FOUND</p>
            </div>
        </section>
    </main>

    <footer class="border-t border-[#bd00ff]/20 bg-black/40 py-6 text-center text-xs text-gray-500 font-mono mt-auto relative z-10">
        © 2026 Moonlight Docs • Powered by StarLyn
    </footer>

    <script>
        // Sincronización del Reloj a la zona horaria de México (America/Mexico_City)
        function startLocalClock() {
            const timeEl = document.getElementById('server-time');
            const dateEl = document.getElementById('server-date');
            
            setInterval(() => {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('es-MX', { timeZone: 'America/Mexico_City', hour12: false });
                const dateStr = now.toLocaleDateString('es-MX', { timeZone: 'America/Mexico_City', day: 'numeric', month: 'short', year: 'numeric' });
                if(timeEl) timeEl.innerText = timeStr;
                if(dateEl) dateEl.innerText = dateStr;
            }, 1000);
        }

        // Simulación de carga e inicio de servicios en la Terminal lateral
        function terminalLog(msg, isSuccess = true) {
            const logs = document.getElementById('term-logs');
            if(!logs) return;
            const line = document.createElement('div');
            line.innerHTML = `<span class="${isSuccess ? 'text-[#00f0ff]' : 'text-red-500'}">»</span> ${msg}`;
            logs.appendChild(line);
            logs.scrollTop = logs.scrollHeight;
        }

        // Estructura de inyección dinámica idéntica al motor JavaScript de Xapi
        // Puedes agregar aquí los endpoints que gustes siguiendo este formato exacto:
        const configData = {
            "DOWNLOADERS": [
                { name: "TikTok Video Downloader", endpoint: "/api/dl/tiktok", method: "GET", params: [{ name: "url", required: true }] },
                { name: "Instagram Media Downloader", endpoint: "/api/dl/ig", method: "GET", params: [{ name: "url", required: true }] }
            ],
            "INTELIGENCIA ARTIFICIAL": [
                { name: "Chat GPT-4o", endpoint: "/api/ai/gpt4", method: "GET", params: [{ name: "text", required: true }] }
            ]
        };

        function renderEndpoints(tags) {
            const container = document.getElementById('api-container');
            if(!container) return;
            container.innerHTML = '';

            for (const [cat, routes] of Object.entries(tags)) {
                const catId = `cat-${cat.replace(/\s+/g, '-')}`;
                const section = document.createElement('div');
                section.className = "w-full mb-6";

                section.innerHTML = `
                    <button onclick="toggleCategory('${catId}')" class="w-full flex items-center justify-between bg-[rgba(14,11,28,0.6)] text-white p-4 rounded-lg neon-border mb-3">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-folder text-[#bd00ff]"></i>
                            <h2 class="text-md font-orbitron font-bold uppercase tracking-wider">${cat}</h2>
                        </div>
                        <div class="flex items-center gap-3 font-mono text-xs">
                            <span class="bg-[#bd00ff]/20 text-[#00f0ff] px-2 py-0.5 rounded border border-[#00f0ff]/30">${routes.length} API</span>
                            <i id="arrow-${catId}" class="fa-solid fa-chevron-down transition-transform"></i>
                        </div>
                    </button>
                    <div id="grid-${catId}" class="grid grid-cols-1 gap-3 hidden px-1"></div>
                `;

                const grid = section.querySelector(`#grid-${catId}`);

                routes.forEach((route, idx) => {
                    const id = `${cat}-${idx}`.replace(/\s+/g, '-');
                    const card = document.createElement('div');
                    card.className = "bg-[#0c0a16] border border-[#bd00ff]/30 rounded-lg p-3 transition-all";
                    card.setAttribute('data-search', `${route.name} ${route.endpoint} ${cat}`);

                    card.innerHTML = `
                        <div class="flex justify-between items-center cursor-pointer select-none" onclick="toggleEndpoint('${id}')">
                            <div class="flex items-center gap-3 overflow-hidden">
                                <span class="px-2 py-0.5 text-[10px] font-mono font-bold text-black bg-[#00f0ff] rounded">${route.method}</span>
                                <code class="text-xs font-mono text-gray-300 truncate">${route.endpoint}</code>
                            </div>
                            <i id="icon-${id}" class="fa-solid fa-plus text-xs text-[#bd00ff]"></i>
                        </div>
                        
                        <div id="body-${id}" class="hidden mt-3 pt-3 border-t border-[#bd00ff]/20 space-y-3">
                            <p class="text-xs text-gray-400 font-mono">${route.name}</p>
                            
                            <div class="space-y-2">
                                ${route.params.map(p => `
                                    <div>
                                        <div class="flex justify-between mb-1 text-[11px] font-mono">
                                            <span class="text-[#00f0ff] font-bold"><i class="fa-solid fa-terminal text-[8px] mr-1"></i>${p.name.toUpperCase()}</span>
                                            <span class="${p.required ? 'text-red-400' : 'text-gray-500'}">${p.required ? 'REQUERIDO' : 'OPCIONAL'}</span>
                                        </div>
                                        <input type="text" id="input-${id}-${p.name}" placeholder="Ingresar valor..." class="w-full bg-black/40 border border-[#bd00ff]/40 font-mono text-xs p-2 text-white focus:outline-none focus:border-[#00f0ff] rounded">
                                    </div>
                                `).join('')}
                            </div>

                            <div class="flex gap-2 pt-2">
                                <button onclick="executeTest('${route.endpoint}', '${route.method}', '${id}')" class="flex-1 bg-[#bd00ff] hover:bg-[#bd00ff]/80 text-white font-orbitron font-bold text-xs py-2 tracking-widest uppercase rounded border border-black shadow-[0_0_8px_rgba(189,0,255,0.4)]">
                                    EJECUTAR
                                </button>
                            </div>

                            <div id="res-${id}" class="hidden bg-black border border-[#00f0ff]/30 rounded-lg overflow-hidden font-mono text-[11px]">
                                <div class="bg-black/80 px-3 py-1.5 border-b border-[#00f0ff]/20 flex justify-between items-center text-[10px] text-gray-400">
                                    <span>STATUS: <span id="status-${id}" class="text-yellow-400">WAITING</span></span>
                                    <span id="time-${id}">--ms</span>
                                </div>
                                <div id="output-${id}" class="p-3 max-h-[250px] overflow-y-auto whitespace-pre-wrap break-all text-gray-300"></div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                container.appendChild(section);
            }
        }

        // Controladores de Colapso e Interacción
        function toggleCategory(catId) {
            const grid = document.getElementById(`grid-${catId}`);
            const arrow = document.getElementById(`arrow-${catId}`);
            grid.classList.toggle('hidden');
            if (arrow) arrow.classList.toggle('rotate-180');
        }

        function toggleEndpoint(id) {
            const body = document.getElementById(`body-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            body.classList.toggle('hidden');
            if (icon) icon.classList.toggle('rotate-45');
        }

        // Lógica del motor de peticiones asíncronas
        async function executeTest(endpoint, method, id) {
            const resArea = document.getElementById(`res-${id}`);
            const output = document.getElementById(`output-${id}`);
            const status = document.getElementById(`status-${id}`);
            const timeBox = document.getElementById('time-' + id);
            
            resArea.classList.remove('hidden');
            status.innerText = "PROCESANDO...";
            output.innerText = "Esperando respuesta del servidor...";

            const start = Date.now();

            // Capturar los parámetros ingresados por el usuario
            const params = {};
            document.querySelectorAll(`[id^="input-${id}-"]`).forEach(input => {
                const paramName = input.id.replace(`input-${id}-`, '');
                if(input.value) params[paramName] = input.value;
            });

            // Armar la URL final para la petición
            let queryUrl = endpoint + (method === 'GET' && Object.keys(params).length ? '?' + new URLSearchParams(params) : '');

            try {
                // Aquí se hace la petición real a tu servidor Backend
                const response = await fetch(queryUrl, { method });
                const duration = Date.now() - start;
                timeBox.innerText = `${duration}ms`;
                status.innerText = `${response.status} ${response.statusText}`;
                
                if(response.ok) {
                    status.className = "text-green-400 font-bold";
                    const json = await response.json();
                    output.innerHTML = syntaxHighlight(json);
                    terminalLog(`GET ${endpoint} -> Exitoso en ${duration}ms`, true);
                } else {
                    status.className = "text-red-400 font-bold";
                    output.innerText = await response.text();
                    terminalLog(`GET ${endpoint} -> Falló con status ${response.status}`, false);
                }
            } catch (err) {
                status.innerText = "ERROR_CONEXION";
                status.className = "text-red-500 font-bold";
                output.innerText = `No se pudo conectar al endpoint:\n${err.message}`;
                timeBox.innerText = "0ms";
            }
        }

        // Embellecedor sintáctico para el visor de JSON de los logs
        function syntaxHighlight(json) {
            if (typeof json != 'string') json = JSON.stringify(json, undefined, 2);
            return json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) cls = 'json-key';
                    else cls = 'json-string';
                } else if (/true|false/.test(match)) cls = 'json-boolean';
                return `<span class="${cls}">${match}</span>`;
            });
        }

        // Sistema de filtrado y búsqueda en tiempo real
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            let hasResults = false;

            document.querySelectorAll('[data-search]').forEach(card => {
                const searchTxt = card.getAttribute('data-search').toLowerCase();
                if(searchTxt.includes(query)) {
                    card.classList.remove('hidden');
                    hasResults = true;
                } else {
                    card.classList.add('hidden');
                }
            });

            document.getElementById('no-results').classList.toggle('hidden', hasResults);
        });

        // Inicialización al cargar la ventana
        document.addEventListener('DOMContentLoaded', () => {
            startLocalClock();
            renderEndpoints(configData);
            terminalLog("Moonlight Docs cargado exitosamente.", true);
            terminalLog("Servidor vinculado a la zona horaria de México.", true);
        });
    </script>
</body>
</html>
