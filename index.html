<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOONLIGHT API</title>
    <link id="favicon" rel="icon" href="https://files.catbox.moe/8i7nc1.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

    <style>
        /* Todos los estilos del X-API que me diste (sin cambios) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            scrollbar-gutter: stable;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            overflow-x: hidden;
            font-family: Arial, sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease, background-image 0.5s ease;
            position: relative;
        }

        /* ... (Mantengo todo tu CSS largo sin cambios, solo cambio el título y algunos textos) ... */
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        mono: ['"JetBrains Mono"', 'monospace'], 
                        display: ['"Space Mono"', 'monospace'], 
                    },
                    colors: { 
                        'bg-main': '#f8fafc', 
                        'term-bg': '#1e1e1e', 
                        'term-text': '#d4d4d4', 
                        'primary': '#8b5cf6', 
                        'sky-blue': '#38bdf8', 
                        'success': '#4ade80', 
                        'warning': '#facc15', 
                        'error': '#f87171'
                    },
                    boxShadow: { 
                        'hard': '4px 4px 0px 0px #8b5cf6', 
                        'hard-hover': '2px 2px 0px 0px #8b5cf6',
                    },
                    animation: {
                        'blink': 'blink 1s step-end infinite',
                        'slide-down': 'slideDown 0.3s ease-out forwards',
                        'marquee': 'marquee 15s linear infinite',
                    },
                    keyframes: {
                        blink: { 
                            '0%, 100%': { opacity: '1' }, 
                            '50%': { opacity: '0' } 
                        },
                        slideDown: { 
                            '0%': { opacity: '0', transform: 'translateY(-10px)' }, 
                            '100%': { opacity: '1', transform: 'translateY(0)' } 
                        },
                        marquee: { 
                            '0%': { transform: 'translateX(100%)' }, 
                            '100%': { transform: 'translateX(-150%)' } 
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="docs-page text-slate-800 min-h-screen flex flex-col font-mono relative code-page" data-role="guest">
    <div id="stars-container"></div>
    <div id="falling-flowers-container"></div>

    <div id="light-blobs">
        <div class="lb lb-1"></div>
        <div class="lb lb-2"></div>
        <div class="lb lb-3"></div>
    </div>
    
    <div id="fixed-bg"></div>
    <div class="backdrop-overlay"></div>
    
    <nav class="border-b-2 border-primary bg-white/90 sticky top-0 z-[60]">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center gap-4 justify-between">
            <div class="flex items-center gap-3 shrink-0">
                <a href="/" class="w-10 h-10 bg-primary text-white flex items-center justify-center font-bold text-xl shadow-hard border-2 border-black hover:bg-primary/90 hover:scale-95 transition-all cursor-pointer">
                    <i class="fa-solid fa-moon"></i>
                </a>
                <h1 id="nav-title" class="font-display font-bold text-xl tracking-tighter uppercase italic text-primary">MOONLIGHT API</h1>
            </div>
            
            <div class="flex-1 max-w-xl mx-auto overflow-hidden h-9 bg-black border-2 border-primary flex items-center relative shadow-hard mx-4 -skew-x-12 hidden md:flex">
                <div id="running-text" class="text-white text-xs font-mono font-bold uppercase tracking-widest skew-x-12 px-4 whitespace-nowrap animate-marquee inline-block min-w-full">
                    WELCOME TO MOONLIGHT API DASHBOARD
                </div>
            </div>
            
            <div class="flex items-center gap-2 shrink-0">
                <button id="themeToggle" onclick="toggleGalaxyTheme()" class="w-10 h-10 border-2 border-primary bg-white text-primary hover:bg-primary hover:text-white hover:shadow-none hover:translate-x-[2px] hover:translate-y-[2px] flex items-center justify-center shadow-hard transition-all shrink-0 cursor-pointer">
                    <i class="fa-solid fa-moon text-lg"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8 grid lg:grid-cols-12 gap-8 items-start relative z-10">
        
        <aside class="lg:col-span-4 lg:sticky lg:top-24 flex flex-col gap-6 h-fit z-40">
            <div id="mascot-widget" class="relative z-50 -mb-20 -ml-4 pointer-events-auto cursor-pointer group/mascot select-none w-fit">
                <div class="relative">
                    <img src="https://files.catbox.moe/8i7nc1.jpeg" alt="Mascot" class="relative z-10 w-28 md:w-32 h-auto object-contain hover:-translate-y-1 hover:scale-105 transition-transform duration-300 drop-shadow-[3px_3px_0px_rgba(139,92,246,0.6)]">
                </div>
            </div>

            <div class="bg-white border-2 border-primary p-5 shadow-hard rounded-lg">
                <div class="flex justify-between items-center mb-4 border-b-2 border-dashed border-primary/20 pb-2">
                    <h3 class="font-bold text-lg italic text-primary">SERVER STATUS</h3>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between text-xs font-bold">
                        <span class="text-gray-500">TIME (WIB)</span>
                        <span id="server-time" class="text-slate-800 font-mono">15:05:00</span>
                    </div>
                    <div class="flex justify-between text-xs font-bold">
                        <span class="text-gray-500">DATE</span>
                        <span id="server-date" class="text-slate-800 font-mono">09 Julio 2026</span>
                    </div>
                    <div class="flex justify-between text-xs font-bold">
                        <span class="text-gray-500">VISITORS</span>
                        <span id="stat-visitors" class="text-primary font-mono">214,837</span>
                    </div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8 min-h-[50vh]">
            <div id="api-container" class="space-y-4 opacity-0 translate-y-4 transition-all duration-700"></div>
        </section>
    </main>

    <!-- El resto (footer, music widget, etc.) se mantiene igual que en tu ZIP -->

</body>
</html>
