<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight API Docs</title>
    <link rel="icon" href="https://files.catbox.moe/8i7nc1.jpeg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #06040d;
            background-image: radial-gradient(rgba(147, 51, 234, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #94a3b8;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container { max-width: 750px; width: 100%; margin-top: 10px; margin-bottom: 40px; }
        
        /* Banner Actualizado */
        .api-banner { width: 100%; height: 190px; border-radius: 12px; border: 1px solid #1a1235; overflow: hidden; background: #000; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); }
        .api-banner img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .api-header { margin-bottom: 25px; border-left: 4px solid #a855f7; padding-left: 15px; }
        .api-title { font-family: 'Space Grotesk', sans-serif; font-size: 2.4rem; font-weight: 700; color: #ffffff; letter-spacing: -0.5px; }
        .api-title span { color: #a855f7; }
        .api-limit { display: inline-flex; align-items: center; background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.25); color: #c084fc; padding: 3px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; margin-top: 6px; font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.5px; }
        .api-subtitle { font-size: 0.88rem; color: #475569; margin-top: 8px; }
        
        .nav-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .nav-btn { display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 0.72rem; font-weight: 700; color: #64748b; background: #0b0817; border: 1px solid #161030; border-radius: 6px; padding: 12px 5px; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s ease; }
        .nav-btn:hover { color: #ffffff; border-color: #a855f7; background: rgba(168, 85, 247, 0.03); }
        
        .search-box { position: relative; width: 100%; margin-bottom: 25px; }
        .search-box input { width: 100%; background: #090614; border: 1px solid #161030; border-radius: 8px; padding: 14px 16px; color: #64748b; font-size: 0.85rem; outline: none; }
        
        .category-chips { display: flex; gap: 8px; margin-bottom: 20px; }
        .chip { background: #0c081a; border: 1px solid #1b133a; color: #ffffff; padding: 6px 14px; border-radius: 6px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #a855f7; }
        .chip span { color: #a855f7; margin-left: 4px; }
        
        /* Endpoint Card con Estilo NANZZAPI */
        .endpoint-card { background: #090615; border: 1px solid #140e2b; border-radius: 10px; overflow: hidden; }
        .endpoint-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: #0d0921; border-bottom: 1px solid #140e2b; }
        .method-get { background: #10b981; color: #ffffff; font-size: 0.7rem; font-weight: 800; padding: 3px 6px; border-radius: 4px; }
        .endpoint-title { font-family: 'Space Grotesk', sans-serif; color: #ffffff; font-weight: 700; font-size: 0.95rem; }
        .endpoint-body { padding: 20px; }
        
        .param-label { font-size: 0.75rem; font-weight: 700; color: #475569; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .url-box { background: #04030a; border: 1px solid #110c24; border-radius: 6px; padding: 14px; font-family: 'Fira Code', monospace; font-size: 0.8rem; color: #10b981; margin-bottom: 20px; word-break: break-all; }
        
        .btn-execute { width: 100%; background: #a855f7; border: none; color: #ffffff; font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; font-weight: 700; padding: 14px; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: background 0.2s; }
        .btn-execute:hover { background: #9333ea; }
        
        .response-container { margin-top: 20px; }
        .status-bar { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 700; color: #475569; margin-bottom: 6px; text-transform: uppercase; }
        .status-dot { width: 6px; height: 6px; background: #475569; border-radius: 50%; }
        .status-dot.success { background: #10b981; box-shadow: 0 0 6px #10b981; }
        
        .json-box { background: #030207; border: 1px solid #110c24; border-radius: 6px; padding: 16px; font-family: 'Fira Code', monospace; font-size: 0.82rem; color: #cbd5e1; overflow-x: auto; white-space: pre; min-height: 60px; line-height: 1.5; }
        .json-key { color: #f43f5e; }
        .json-string { color: #10b981; }
        .json-boolean { color: #f59e0b; }
    </style>
</head>
<body>

    <div class="container">
        <div class="api-banner">
            <img src="https://files.catbox.moe/8i7nc1.jpeg" alt="API Banner">
        </div>

        <div class="api-header">
            <h1 class="api-title">Moonlight <span>Docs</span></h1>
            <div class="api-limit">PRO REST API</div>
            <p class="api-subtitle">Repositorio de endpoints privados.</p>
        </div>

        <div class="nav-buttons">
            <a href="https://wa.me/529992042946?text=starlyn" target="_blank" class="nav-btn">Contact</a>
            <a href="#" class="nav-btn">Feedback</a>
            <a href="https://whatsapp.com/channel/0029Vb6qIht5q08ZMPgVrA1y" target="_blank" class="nav-btn">Channel</a>
            <a href="https://chat.whatsapp.com/F41976tzldkDSA6gtTj5sT" target="_blank" class="nav-btn">Group</a>
        </div>

        <div class="search-box"><input type="text" value="pene" disabled></div>

        <div class="category-chips">
            <div class="chip">NSFW <span>1</span></div>
        </div>

        <div class="endpoint-card">
            <div class="endpoint-header">
                <span class="method-get">GET</span>
                <span class="endpoint-title">Nsfw Pene</span>
            </div>
            
            <div class="endpoint-body">
                <div class="param-label">Request URL</div>
                <div class="url-box">/api/nsfw/pene</div>

                <button class="btn-execute" onclick="runLocalEndpoint()">EXECUTE</button>

                <div class="response-container">
                    <div class="status-bar">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="statusText">Idle</span>
                    </div>
                    <div class="json-box" id="jsonOutput">// Awaiting execution...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="./pene/index.html" id="endpointScript"></script>

    <script>
        function runLocalEndpoint() {
            const outputBox = document.getElementById('jsonOutput');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            outputBox.innerText = '// Executing core logic inside /pene/...';

            setTimeout(() => {
                // Comprobamos si la base de datos interna se cargó correctamente desde el otro index
                if (typeof getPeneData === 'function') {
                    const data = getPeneData();
                    let jsonString = JSON.stringify(data, null, 2);
                    
                    // Colorear el JSON de salida
                    jsonString = jsonString
                        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|\b[0-9]+\b)/g, function (match) {
                            let cls = 'json-string';
                            if (/^"/.test(match)) {
                                if (/:$/.test(match)) cls = 'json-key';
                                else cls = 'json-string';
                            } else if (/true|false|null/.test(match)) cls = 'json-boolean';
                            return '<span class="' + cls + '">' + match + '</span>';
                        });

                    statusDot.className = "status-dot success";
                    statusText.innerText = "Status: 200 OK";
                    outputBox.innerHTML = jsonString;
                } else {
                    statusDot.className = "status-dot";
                    statusText.innerText = "Error";
                    outputBox.innerText = '// Error: No se pudo enlazar la lógica interna del archivo ./pene/index.html';
                }
            }, 300);
        }
    </script>
</body>
</html>
